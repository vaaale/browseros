version: "3.9"

# Keycloak override: adds a local Keycloak instance with a pre-seeded BOS realm.
# Usage: docker compose -f docker-compose.yml -f docker-compose.keycloak.yml up

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./bastion/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    networks:
      - bos-net
